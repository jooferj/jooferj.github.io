<!doctype html>
<html lang="en-GB">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="../../mrt-color.css">
    <link rel="stylesheet" href="../anncs.css">

    <link rel="icon" type="image/svg+xml" href="../logo-red.svg">
    <title>joofer.j/announcements</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style type="text/css">
        html {
            background: #000000;
            font-family: Ubuntu;
            font-weight: 500;
            color: #FFFFFF;
        }
    </style>
</head>
  
<body>
    <div id="header">
        <span>joofer.j/Announcements</span>
        <div id="header-right">
            <a id="home" href="https://jooferj.github.io">Back</a>
        </div>
    </div>
  
    <div id="content">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search announcements...">
            
            <div class="search-options">
                <label><input type="radio" name="search-type" value="title" checked> Search Titles</label>
                <label style="margin-left: 15px;"><input type="radio" name="search-type" value="transcript"> Search Transcripts</label>
            </div>

            <div id="filter-tags">
                </div>
        </div>

        <div id="announcement-list">
            <span class="body-text-only">Loading announcements...</span>
        </div>
    </div>

    <script src="../player.js"></script>
</body>
</html>
