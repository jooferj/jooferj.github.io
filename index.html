<!doctype html>
<html lang="en-GB">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="index.css">
		<link rel="stylesheet" href="../mrt-color.css">
		<link rel="stylesheet" href="exam-schedule/exams.css">

		<link rel="icon" type="image/svg+xml" href="/logo-red.svg">
		<title>joofer.j</title>
		
		<style type="text/css">
			html {
				background: #000000;
				font-family: Ubuntu;
				font-weight: 500;
				color: #FFFFFF;
			}
		</style>
	</head>
	
	<body>
		<div id="header">
			<span>joofer.j</span>
			<div id="header-right">
				<a id="home" href="https://github.com/jooferj/jooferj.github.io/tree/main">GitHub</a>
			</div>
		</div>
		
		<div id="content">
			<div id="exam-grid">
			</div>
			<a href="/clocks">
				<span>Clocks</span>
			</a>
			<a href="/resources">
				<span>Resources</span>
			</a>
			<a href="/announcements">
				<span>Announcements</span>
			</a>
			<a href="/circleline">
				<span class="smrt-ccl nostack">
					<img src="announcements/icons/CCL.svg" style="padding-right: 2%; height: 45%;"/>
					Circle Line Info
				</span>
			</a>
			<a href="/test">
				<span>UI Testing</span>
			</a>
		</div>

		<script>
			async function loadExams() {
    try {
        const response = await fetch('exam-schedule/exams.json');
        const exams = await response.json();
        const grid = document.getElementById('exam-grid');
        const now = new Date();
		const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        exams.sort((a, b) => new Date(a.date) - new Date(b.date));
        const futureExams = exams.filter(exam => new Date(exam.date) >= today);
        const displayedExams = futureExams.slice(0, 11);

        displayedExams.forEach(exam => {
            const examDate = new Date(exam.date);
            const diffDays = Math.ceil((examDate - now) / (1000 * 60 * 60 * 24));

			const todayClass = diffDays === 0 ? 'is-today' : '';

            let colorClass = 'color-blue';
            if (diffDays <= 30) colorClass = 'color-red';
            else if (diffDays <= 60) colorClass = 'color-orange';
            else if (diffDays <= 90) colorClass = 'color-green';

            const card = document.createElement('div');
            card.className = 'exam-card';
            card.innerHTML = `
                <div class="exam-title ${todayClass}">${exam.name}</div>
                <span class="days-left ${colorClass}">${diffDays}<span class="days-label"> d</span></span>
            `;
            grid.appendChild(card);
        });

        if (futureExams.length > 11) {
            const moreCard = document.createElement('a');
            moreCard.className = 'exam-card show-more-card';
            moreCard.style.display = "flex";
            moreCard.style.justifyContent = "center";
            moreCard.style.alignItems = "center";
            moreCard.href = '/exam-schedule'; 
            moreCard.innerText = 'Show More';
            grid.appendChild(moreCard);
        }
    } catch (error) {
        console.error('Error loading exam data:', error);
    }
}
loadExams();
		</script>
	</body>
</html>
