<!doctype html>
<html lang="en-GB">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="index.css">
		<link rel="stylesheet" href="mrt-color.css">
		<link rel="stylesheet" href="schedule/schedule.css">

		<link rel="icon" type="image/svg+xml" href="/logo-red.svg">
		<title>joofer.j</title>
		
		<style type="text/css">
			html {
				background: #000000;
				font-family: Ubuntu;
				font-weight: 500;
				color: #FFFFFF;
			}
		</style>
	</head>
	
	<body>
		<div id="header">
			<span>joofer.j</span>
			<div id="header-right">
				<a id="home" href="https://github.com/jooferj/jooferj.github.io/tree/main">GitHub</a>
			</div>
		</div>
		
		<div id="content">
			<div id="exam-grid"></div>
			<a href="/clocks"><span>Clocks</span></a>
			<a href="/resources"><span>Resources</span></a>
			<a href="/announcements"><span>Announcements</span></a>
			<a href="/circleline">
				<span class="smrt-ccl nostack">
					<img src="media/caplets/CCL.svg" style="padding-right: 2%; height: 45%;"/>
					Circle Line Info
				</span>
			</a>
		</div>

		<script>
			async function loadExams() {
				try {
					const response = await fetch('schedule/exams.json');
					const exams = await response.json();
					const grid = document.getElementById('exam-grid');
					const now = new Date();
					const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

					const defaultPinned = ["1184", "1160", "4052", "4049", "6091", "6092", "2260"];
					const pinnedSubjects = JSON.parse(localStorage.getItem('pinnedSubjects')) || defaultPinned;

					const displayPrefs = JSON.parse(localStorage.getItem('examDisplayPrefs')) || {
						format: 'name', boldCode: false, italicCode: false, boldName: false, italicName: false, rangeRed: 30, rangeOrange: 60, rangeGreen: 90,
						showOL: true, showTP: true, showPrelim: true
					};

					if (displayPrefs.showOL === undefined) displayPrefs.showOL = true;
					if (displayPrefs.showTP === undefined) displayPrefs.showTP = true;
					if (displayPrefs.showPrelim === undefined) displayPrefs.showPrelim = true;

					const futureExams = exams.filter(exam => {
						const isUpcoming = new Date(exam.date) >= today;
						if (!isUpcoming) return false;

						// Check Paper Type filters
						const upperName = exam.name.toUpperCase();
						const hasOL = upperName.includes('OL');
						const hasTP = upperName.includes('TP');
						const hasPrelim = upperName.includes('PRELIM');

						if (hasOL && !displayPrefs.showOL) return false;
						if (hasTP && !displayPrefs.showTP) return false;
						if (hasPrelim && !displayPrefs.showPrelim) return false;

						// Pinned subject filter check
						const matchCode = exam.name.match(/^\d+/);
						if (matchCode) {
							return pinnedSubjects.includes(matchCode[0]);
						}
						return false;
					});

					futureExams.sort((a, b) => new Date(a.date) - new Date(b.date));
					const displayedExams = futureExams.slice(0, 11);

					displayedExams.forEach(exam => {
						const examDate = new Date(exam.date);
						const diffDays = Math.ceil((examDate - now) / (1000 * 60 * 60 * 24));
						const todayClass = diffDays === 0 ? 'is-today' : '';

						let colorClass = 'color-blue';
						if (diffDays <= displayPrefs.rangeRed) colorClass = 'color-red';
						else if (diffDays <= displayPrefs.rangeOrange) colorClass = 'color-orange';
						else if (diffDays <= displayPrefs.rangeGreen) colorClass = 'color-green';

						// Enhanced parser to correctly match versatile suffixes like "P3 OL", "TP", "P1 OL", "Prelim" etc.
						let processedHTML = `<span>${exam.name}</span>`;
						const match = exam.name.match(/^(\d+)\s+(.+?)(?:\s+((?:P\d+\s+|OL\s+|TP\s+|Prelim\s+)*(?:P\d+|OL|TP|Prelim)))?$/i);
						if (match) {
							const codeStyle = `class="${displayPrefs.boldCode ? 'font-weight-bold' : ''} ${displayPrefs.italicCode ? 'font-style-italic' : ''}"`.trim();
							const nameStyle = `class="${displayPrefs.boldName ? 'font-weight-bold' : ''} ${displayPrefs.italicName ? 'font-style-italic' : ''}"`.trim();

							const codeHTML = `<span ${codeStyle}>${match[1]}</span>`;
							const nameHTML = `<span ${nameStyle}>${match[2].trim()}</span>`;
							const suffixHTML = match[3] ? ` <span>${match[3].trim()}</span>` : '';

							if (displayPrefs.format === 'code') processedHTML = `${codeHTML}${suffixHTML}`;
							else if (displayPrefs.format === 'name') processedHTML = `${nameHTML}${suffixHTML}`;
							else processedHTML = `${codeHTML} ${nameHTML}${suffixHTML}`;
						}

						let timeLabelStr = '';
						if (diffDays > 14) {
							const weeks = Math.floor(diffDays / 7);
							const remDays = diffDays % 7;
							timeLabelStr = remDays > 0 ? `${weeks}<span class="days-label">w  </span> ${remDays}<span class="days-label">d</span>` : `${weeks}<span class="days-label"> w</span>`;
						} else {
							timeLabelStr = `${diffDays}<span class="days-label"> d</span>`;
						}

						const card = document.createElement('div');
						card.className = 'exam-card';
						card.innerHTML = `
							<div class="exam-title ${todayClass}">${processedHTML}</div>
							<span class="days-left ${colorClass}">${timeLabelStr}</span>
						`;
						grid.appendChild(card);
					});

					if (futureExams.length > 11) {
						const moreCard = document.createElement('a');
						moreCard.className = 'exam-card show-more-card';
						moreCard.style.display = "flex";
						moreCard.style.justifyContent = "center";
						moreCard.style.alignItems = "center";
						moreCard.href = '/schedule'; 
						moreCard.innerText = 'Show More';
						grid.appendChild(moreCard);
					}
				} catch (error) {
					console.error('Error loading exam data:', error);
				}
			}
			loadExams();
		</script>
	</body>
</html>
