<!doctype html>
<html lang="en-GB">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="../index.css">
		<link rel="stylesheet" href="exams.css">

		<link rel="icon" type="image/svg+xml" href="../logo-red.svg">
		<title>joofer.j/exam-schedule</title>
		
		<style type="text/css">
			html {
				background: #000000;
				font-family: Ubuntu;
				font-weight: 500;
				color: #FFFFFF;
			}
		</style>
	</head>
  
	<body>
		<div id="header">
			<span>joofer.j/exam-schedule</span>
			<div id="header-right">
				<a id="home" href="/">Home</a>
			</div>
		</div>

		<div id="content">
			<div id="schedule-grid"></div>
			<span class="body-text-only" style="padding-top: 5px; padding-bottom: 2.5px;">TP: Timed Practice</span>
			<span class="body-text-only" style="padding-top: 2.5px; padding-bottom: 5px;">Prelims: T3W8 to T3W10</span>
			<span class="body-text-only" style="padding-top: 2.5px; padding-bottom: 5px;">OL: O Levels (actual)</span>
		</div>

		<script>
			let examData = [];

			async function loadExams() {
				try {
					const response = await fetch('exams.json');
					examData = await response.json();
					
					renderSchedule();
				} catch (e) {
					console.error("Error loading exams:", e);
				}
			}

			function renderSchedule() {
				const grid = document.getElementById('schedule-grid');
				grid.innerHTML = '';
				
				const now = new Date();
				const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

				const upcoming = examData
					.map(exam => ({ ...exam, dateObj: new Date(exam.date) }))
					.filter(exam => exam.dateObj >= today)
					.sort((a, b) => a.dateObj - b.dateObj);
				
				upcoming.forEach(exam => {
					const diffDays = Math.ceil((exam.dateObj - now) / (1000 * 60 * 60 * 24));
					const todayClass = diffDays === 0 ? 'is-today' : '';
					const dayName = exam.dateObj.toLocaleDateString('en-GB', { weekday: 'long' });
					const formattedDate = exam.dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
					
					let colorClass = 'color-blue';
					if (diffDays <= 30) colorClass = 'color-red';
					else if (diffDays <= 60) colorClass = 'color-orange';
					else if (diffDays <= 90) colorClass = 'color-green';

					let dynamicCountdownStr = '';
					const weeks = Math.floor(diffDays / 7);
					const remDays = diffDays % 7;
					if (weeks > 0 && remDays > 0) dynamicCountdownStr = `${weeks}<span class="days-label">w </span> ${remDays}<span class="days-label">d</span>`;
					else if (weeks > 0 && remDays === 0) dynamicCountdownStr = `${weeks}<span class="days-label">w</span>`;
					else dynamicCountdownStr = `${remDays}<span class="days-label">d</span>`;
					
					const card = document.createElement('div');
					card.className = 'schedule-card';
					
					card.innerHTML = `
					<div class="card-header">
						<span>${exam.week || ''}</span>
						<span>${dayName}</span>
					</div>
					<div class="card-body">
						<div class="exam-name-static ${todayClass}">${exam.name}</div>
						<div class="date-row ${todayClass}">${formattedDate}</div>
						<div class="countdown-row ${colorClass}">${dynamicCountdownStr}</div>
					</div>
					`;
					grid.appendChild(card);
				});
			}

			loadExams();
		</script>
	</body>	
</html>
