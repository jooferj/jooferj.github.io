<!doctype html>
<html lang="en-GB">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="../../index.css">
		<link rel="stylesheet" href="../../mrt-color.css">
		<link rel="stylesheet" href="icon-list.css">

		<link rel="icon" type="image/svg+xml" href="../../logo-red.svg">
		<title>joofer.j/caplets</title>
		
		<style type="text/css">
			html {
				background: #000000;
				font-family: Ubuntu;
				font-weight: 500;
				color: #FFFFFF;
			}

			.icon-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
				gap: 15px;
				padding: 20px;
				box-sizing: border-box;
				width: 100vw;
			}
			
			.icon-card {
				background-color: #1a1a1a;
				border-radius: 6px;
				padding: 12px 8px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
				box-sizing: border-box;
				transition: transform 0.15s ease, background-color 0.15s ease;
			}

			.icon-card:hover {
				transform: translateY(-2px);
				background-color: #242424;
			}
			
			.icon-card img {
				width: auto;
				height: 48px;
				max-width: 90%;
				margin-bottom: 8px;
				object-fit: contain;
			}

			.icon-card .smalltext {
				display: block;
				width: 100%;
				overflow: hidden;
			}
		</style>
	</head>
	
	<body>
		<div id="header">
			<span>joofer.j/caplets</span>
			<div id="header-right">
				<a id="home" href="caplets.html">Back</a>
			</div>
		</div>
		
		<div id="content">
			<div class="icon-grid" id="file-grid"></div>
		</div>

		<script>
			async function loadIcons() {
				try {
					// CHANGE JSON FILE NAME
					const response = await fetch('json/caplets-ccl.json');
					if (!response.ok) throw new Error("Error loading JSON");
					
					const iconData = await response.json();
					const grid = document.getElementById('file-grid');
					
					iconData.forEach(item => {
						const cardElement = document.createElement('a');
						cardElement.href = item.link;
						cardElement.className = 'icon-card';
						
						cardElement.innerHTML = `
							<img src="${item.link}" alt="${item.text}" loading="lazy"/>
							<span class="smalltext">${item.text}</span>
						`;
						grid.appendChild(cardElement);
					});
				}
					
				catch (error) {
					console.error("Error rendering cards:", error);
					document.getElementById('file-grid').innerHTML = 
						`<span class="body-text-only" style="color: #ff5555; padding-top: 20px;">Failed to load items. Check console.</span>`;
				}
			}
			
			window.addEventListener('DOMContentLoaded', loadIcons);
		</script>
	</body>
</html>
